services:
  sentinel-controller:
    build:
      context: ./controller
      dockerfile: Dockerfile
    container_name: sentinel-controller
    networks:
      - sentinel_internal
      - sentinel_egress
    environment:
      - SENTINEL_POLICY_FILE=/policies/sentinel-policy.yaml
      - SENTINEL_WORKSPACE_PATH=/workspace
      - SENTINEL_LOG_DIR=/logs
      - SENTINEL_LOG_LEVEL=INFO
      - SENTINEL_APPROVAL_MODE=full
      - SENTINEL_VERBOSE_RESULTS=false
      - SENTINEL_PIN_REQUIRED=true
      - SENTINEL_PIN_FILE=/run/secrets/sentinel_pin
      - SENTINEL_OLLAMA_URL=http://sentinel-qwen:11434
      - SENTINEL_OLLAMA_MODEL=qwen3:14b
      - SENTINEL_OLLAMA_TIMEOUT=1800
    volumes:
      - ./policies:/policies:ro
      - sentinel-workspace:/workspace
      - ./logs:/logs
    secrets:
      - claude_api_key
      - sentinel_pin
    ports:
      - "8000:8000"
    restart: always
    depends_on:
      - sentinel-qwen
    # Resource limits (#23)
    mem_limit: 4G
    mem_reservation: 1G
    cpus: 4.0
    # Read-only filesystem (#24)
    read_only: true
    tmpfs:
      - /tmp:size=100M,noexec
    # Health check (#30)
    healthcheck:
      test: ["CMD-SHELL", "python -c 'import urllib.request; urllib.request.urlopen(\"http://localhost:8000/health\")'"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  sentinel-qwen:
    image: docker.io/ollama/ollama@sha256:44893537fcc6f100b70ceb7f5c9fd8f787ba58f9f8ce73bf4a48a5b05fd8c422
    container_name: sentinel-qwen
    networks:
      - sentinel_internal
    environment:
      - OLLAMA_HOST=0.0.0.0:11434
      - OLLAMA_KEEP_ALIVE=5m
    volumes:
      - sentinel-ollama-data:/root/.ollama
    devices:
      - nvidia.com/gpu=all
    restart: always
    # Resource limits (#23)
    mem_limit: 14G
    cpus: 4.0
    # Health check (#30)
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'echo -e \"GET /api/tags HTTP/1.0\\r\\nHost: localhost\\r\\n\\r\\n\" > /dev/tcp/localhost/11434'"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  sentinel-ui:
    build:
      context: ./gateway
    container_name: sentinel-ui
    networks:
      - sentinel_egress
    ports:
      - "3001:8443"
      - "3002:8080"
    restart: unless-stopped
    depends_on:
      - sentinel-controller
    # Resource limits (#23)
    mem_limit: 128M
    cpus: 1.0
    # Read-only filesystem (#24)
    read_only: true
    tmpfs:
      - /tmp:size=10M
      - /var/cache/nginx:size=50M
      - /run:size=10M
    # Health check (#30)
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "--no-check-certificate", "https://localhost:8443/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 5s

networks:
  sentinel_internal:
    driver: bridge
    internal: true
    ipam:
      config:
        - subnet: 172.30.0.0/24
  sentinel_egress:
    driver: bridge

secrets:
  claude_api_key:
    file: /home/kifterz/.secrets/claude_api_key.txt
  sentinel_pin:
    file: /home/kifterz/.secrets/sentinel_pin.txt

volumes:
  sentinel-workspace:
  sentinel-ollama-data:
