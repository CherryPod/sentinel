rules:
- id: sql-injection-concat
  pattern-either:
      - pattern: |
          $STMT.executeQuery($X + ...)
      - pattern: |
          $STMT.executeUpdate($X + ...)
      - pattern: |
          $STMT.execute($X + ...)
      - pattern: |
          $CONN.prepareStatement($X + ...)
  message: >-
    SQL query built via string concatenation. Use parameterized queries
    (PreparedStatement with ?) to prevent SQL injection.
  metadata:
    cwe:
    - 'CWE-89: Improper Neutralization of Special Elements used in an SQL Command (SQL Injection)'
    cwe_id: CWE-89
    prescan_regex: (executeQuery|executeUpdate|execute|prepareStatement)\(
  severity: WARNING
  languages:
  - java
