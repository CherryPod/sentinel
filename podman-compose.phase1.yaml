## Phase 1 compose file — 2 containers (sentinel + sentinel-ollama)
##
## Runs on different ports/networks/volumes to avoid conflicts with
## the existing 3-container stack. Once validated, merge into podman-compose.yaml.
##
## Usage:
##   podman compose -f podman-compose.phase1.yaml up -d
##   curl -k https://localhost:3003/api/health
##   curl http://localhost:3004/  (should redirect to https)

services:
  sentinel-v2:
    build:
      context: .
      dockerfile: container/Containerfile
    container_name: sentinel-v2
    networks:
      - sentinel_internal_v2
      - sentinel_egress_v2
    environment:
      - SENTINEL_POLICY_FILE=/policies/sentinel-policy.yaml
      - SENTINEL_WORKSPACE_PATH=/workspace
      - SENTINEL_LOG_DIR=/logs
      - SENTINEL_LOG_LEVEL=INFO
      - SENTINEL_APPROVAL_MODE=full
      - SENTINEL_VERBOSE_RESULTS=false
      - SENTINEL_PIN_REQUIRED=true
      - SENTINEL_PIN_FILE=/run/secrets/sentinel_pin
      - SENTINEL_OLLAMA_URL=http://sentinel-ollama-v2:11434
      - SENTINEL_OLLAMA_MODEL=qwen3:14b
      - SENTINEL_OLLAMA_TIMEOUT=1800
      # Phase 1 settings
      - SENTINEL_DB_PATH=/data/sentinel.db
      - SENTINEL_STATIC_DIR=/app/ui
      - SENTINEL_TLS_CERT_FILE=/app/tls/sentinel.crt
      - SENTINEL_TLS_KEY_FILE=/app/tls/sentinel.key
      - SENTINEL_HTTPS_PORT=8443
      - SENTINEL_HTTP_PORT=8080
      - SENTINEL_REDIRECT_ENABLED=true
      - SENTINEL_EXTERNAL_HTTPS_PORT=3003
      - SENTINEL_ALLOWED_ORIGINS=https://localhost:3003,https://localhost:3004
    volumes:
      - ./policies:/policies:ro
      - sentinel-data-v2:/data
      - sentinel-workspace-v2:/workspace
      - ./logs:/logs
    secrets:
      - claude_api_key
      - sentinel_pin
    ports:
      - "3003:8443"
      - "3004:8080"
    restart: always
    depends_on:
      - sentinel-ollama-v2
    # Resource limits
    mem_limit: 4G
    mem_reservation: 1G
    cpus: 4.0
    # Read-only filesystem
    read_only: true
    tmpfs:
      - /tmp:size=100M,noexec
    # Health check
    healthcheck:
      test: ["CMD-SHELL", "python -c 'import urllib.request, ssl; ctx=ssl.create_default_context(); ctx.check_hostname=False; ctx.verify_mode=ssl.CERT_NONE; urllib.request.urlopen(\"https://localhost:8443/health\", context=ctx)'"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  sentinel-ollama-v2:
    image: docker.io/ollama/ollama@sha256:44893537fcc6f100b70ceb7f5c9fd8f787ba58f9f8ce73bf4a48a5b05fd8c422
    container_name: sentinel-ollama-v2
    networks:
      - sentinel_internal_v2
    environment:
      - OLLAMA_HOST=0.0.0.0:11434
      - OLLAMA_KEEP_ALIVE=5m
      - OLLAMA_NUM_CTX=16384
    volumes:
      - sentinel-ollama-data-v2:/root/.ollama
    devices:
      - nvidia.com/gpu=all
    restart: always
    # Resource limits
    mem_limit: 14G
    cpus: 4.0
    # Health check
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'echo -e \"GET /api/tags HTTP/1.0\\r\\nHost: localhost\\r\\n\\r\\n\" > /dev/tcp/localhost/11434'"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

networks:
  sentinel_internal_v2:
    driver: bridge
    internal: true
    ipam:
      config:
        - subnet: 172.31.0.0/24
  sentinel_egress_v2:
    driver: bridge

secrets:
  claude_api_key:
    file: ./secrets/claude_api_key.txt
  sentinel_pin:
    file: ./secrets/sentinel_pin.txt

volumes:
  sentinel-data-v2:
  sentinel-workspace-v2:
  sentinel-ollama-data-v2:
