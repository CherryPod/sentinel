# HTTP — redirect to HTTPS
server {
    listen 8080;
    server_name _;
    return 301 https://$host:8443$request_uri;
}

# HTTPS
server {
    listen 8443 ssl;
    server_name _;

    ssl_certificate /etc/nginx/ssl/sentinel.crt;
    ssl_certificate_key /etc/nginx/ssl/sentinel.key;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    # Handle plain HTTP sent to HTTPS port — redirect instead of 400
    # Use $host (preserves the port from the original request) rather than $server_port
    # (which is the internal container port 8443, not the exposed host port)
    error_page 497 =301 https://$http_host$request_uri;

    # Request size limit (#13 / code review)
    client_max_body_size 1m;

    # Security headers (#28 / code review #15)
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; connect-src 'self'; frame-ancestors 'none';" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    root /usr/share/nginx/html;
    index index.html;

    # Static files
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Reverse proxy to sentinel-controller (strip /api prefix)
    location /api/ {
        proxy_pass http://sentinel-controller:8000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Task execution can take a while (LLM calls)
        proxy_read_timeout 300s;
        proxy_connect_timeout 10s;
    }
}
